name: publish

# Publishes the npm package AND registers the server in the official MCP Registry
# (registry.modelcontextprotocol.io) via GitHub OIDC — no registry secret needed.
# Trigger: push a version tag (`git tag v0.1.8 && git push --tags`) OR run manually
# from the Actions tab ("Run workflow"). Requires the repo secret NPM_TOKEN.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC → MCP Registry auth (proves this repo's owner => io.github.hei33enberg/*)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci || npm install
      - run: npm test

      # Preflight: fail LOUDLY with a clear message if the token is missing, instead
      # of a masked ENEEDAUTH deep in the npm step.
      - name: Check NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set in THIS repo. Add it under Settings → Secrets and variables → Actions → New repository secret (name: NPM_TOKEN), then re-run."
            exit 1
          fi

      # 1) npm — the MCP Registry only stores metadata, so the package (carrying the
      #    matching `mcpName`) must exist on npm first.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 2) Official MCP Registry — validates server.json against the published package.
      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to the MCP Registry
        run: ./mcp-publisher publish
